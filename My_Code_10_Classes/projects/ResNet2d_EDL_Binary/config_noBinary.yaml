# --------------------------------------------------
# 数据预处理配置文件 (config.yaml)
# --------------------------------------------------

data:
  type: wpt
  # 原始 .mat 数据文件所在的目录路径
  data_path: 'data/WPTarrays'
  
  file_names:
    - 'normal_0.mat'     # 标签: 0
    - 'IR007_0.mat'      # 标签: 1
    - 'B007_0.mat'       # 标签: 2
    - 'OR007@6_0.mat'    # 标签: 3
    - 'IR014_0.mat'      # 标签: 4
    - 'B014_0.mat'       # 标签: 5
    - 'OR014@6_0.mat'    # 标签: 6
    - 'IR021_0.mat'      # 标签: 7
    - 'B021_0.mat'       # 标签: 8
    - 'OR021@6_0.mat'    # 标签: 9
  
  truncated_value: 102912
  time_steps: 1024
  overlap_ratio: 0.5
  
  csv_output_path: 'data/samples_data.csv'
  
  # --- make_raw_signal_dataset.py 配置 ---
  
  csv_file_path: 'data/samples_data.csv'
  split_ratios: [0.7, 0.2, 0.1]
  
  # 预处理原始信号输出目录
  wpt_output_dir: 'data/WPTarrays'

  # --- Open-set 配置 ---
  openset:
    # 训练时视为已知类的标签列表
    known_classes: [0,1,2,3,4,5,7,8,9]
    # 测试时视为未知类的标签列表
    unknown_classes: [6]

# --------------------------------------------------
# 模型和训练配置文件
# --------------------------------------------------

model:
  # 模型类型: ResNet18_2d_Binary (带二分类头的 EDL 模型)
  type: 'ResNet18_2d_Binary'
  num_classes: 9
  # 是否启用主分类头：true=主头+二分类头，false=仅二分类头
  use_main_head: false

train:
  num_epochs: 60
  
  batch_size: 32
  learning_rate: 0.0001
  checkpoint_dir: 'checkpoints/ResNet2d_EDL_Binary/NoBinary/run1'
  notes: 'ResNet2d + EDL (MSE损失) 没有二分类头'
  
  # EDL相关配置
  edl_loss_type: 'mse'  # 'mse', 'digamma', 'log'
  edl_annealing_step: 40  # KL退火步数
  binary_loss_weight: 1.0  # 二分类损失权重（仅当 use_main_head 为 true 时主损失+二分类损失会加权）
  
  # 设备配置（可选）：'cuda' 或 'cpu'，如果不指定则自动检测
  device: 'cuda'
  
  # 优化器配置
  optimizer: 'SGD'
  momentum: 0.9
  weight_decay: 0.0001

  # 学习率调度器配置
  scheduler:
    use_scheduler: true
    scheduler_type: 'StepLR'
    step_size: 40
    gamma: 0.1
