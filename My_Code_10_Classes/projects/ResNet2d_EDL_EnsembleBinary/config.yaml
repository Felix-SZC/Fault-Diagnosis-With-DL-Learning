# --------------------------------------------------
# EDL + K 个独立二分类小模型：每个小模型 ResNet18_2d(num_classes=2)，EDL 损失，保存 model_0.pth..model_{K-1}.pth
# --------------------------------------------------

data:
  type: wpt
  wpt_output_dir: 'data/WPTarrays'
  file_names:
    - 'normal_0.mat'
    - 'IR007_0.mat'
    - 'B007_0.mat'
    - 'OR007@6_0.mat'
    - 'IR014_0.mat'
    - 'B014_0.mat'
    - 'OR014@6_0.mat'
    - 'IR021_0.mat'
    - 'B021_0.mat'
    - 'OR021@6_0.mat'
  truncated_value: 102912
  time_steps: 1024
  overlap_ratio: 0.5
  csv_output_path: 'data/samples_data.csv'
  csv_file_path: 'data/samples_data.csv'
  split_ratios: [0.7, 0.2, 0.1]
  openset:
    known_classes: [0,1,2,3,4,5,7,8,9]
    unknown_classes: [6]

model:
  type: 'ResNet18_2d_Light'
  num_classes: 9

train:
  num_epochs: 60
  batch_size: 32
  learning_rate: 0.0001
  checkpoint_dir: 'checkpoints/ResNet2d_EDL_EnsembleBinary/6/annealing_step_60/ResNet2dlight'
  notes: 'EDL + K independent binary small models (ResNet2d, 2-class EDL per class)'
  edl_loss_type: 'mse'
  edl_annealing_step: 60   # 设为 0 关闭 KL 退火；大于 0 时从 0 线性增至 1
  device: 'cuda'
  optimizer: 'SGD'
  momentum: 0.9
  weight_decay: 0.0001
  scheduler:
    use_scheduler: true
    scheduler_type: 'StepLR'
    step_size: 40
    gamma: 0.1
