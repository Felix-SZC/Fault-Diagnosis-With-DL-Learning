# =========================================================
# 阶段一：LaoDA 闭集 K 类 EDL 预训练（与 known_classes 长度一致）
# 产出: checkpoint_dir/pretrained_full.pth
# 下一步: train_nvf_frozen_backbone.py + bench_NvF_LaoDA_frozen_backbone.yaml
# =========================================================

data:
  data_dir: '../Kong_code&&data/数据打包/1'
  openset:
    known_classes:
      - '1正常'
      - '2轴承内圈'
      - '3轴承外圈'
      - '4轴承滚子'
      - '5轴承组合'
      - '6齿根裂纹'
      - '8齿轮点蚀'
    unknown_classes:
      - '7齿轮断齿'
      - '9齿轮缺齿'

model:
  type: 'LaoDA'

train:
  num_epochs: 80
  batch_size: 256
  learning_rate: 0.001
  checkpoint_dir: 'checkpoints/LaoDA/closed_pretrain/seed1'
  notes: 'Stage1 closed-set multiclass pretrain for shared LaoDA backbone'
  edl_loss_type: 'mse'
  edl_annealing_step: 80
  kl_weight: 5.0
  device: 'cuda'
  optimizer: 'Adam'
  momentum: 0.9
  weight_decay: 0.0001
  scheduler:
    use_scheduler: true
    scheduler_type: 'StepLR'
    step_size: 40
    gamma: 0.1
